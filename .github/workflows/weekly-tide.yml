name: Weekly Tide

on:
  schedule:
    # Monday 02:23 UTC — after HF has published the previous week's lists.
    - cron: "23 2 * * 1"
  workflow_dispatch:
    inputs:
      days:
        description: "How many past days to process"
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: weekly-tide
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests markdown pillow

      - name: Process the past week
        env:
          HUNYUAN_LLM: ${{ secrets.HUNYUAN_LLM }}
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          for i in $(seq 0 $((DAYS - 1))); do
            d=$(date -u -d "-$i day" +%F)
            echo "::group::$d"
            python -m pipeline.daily --date "$d" --top 5 --prune || echo "$d failed, continuing"
            echo "::endgroup::"
          done

      - name: Commit new data
        run: |
          git config user.name "tide-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data."
          else
            git commit -m "data: weekly tide $(date -u +%F)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi

      - name: Build site
        run: python -m pipeline.publish

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
